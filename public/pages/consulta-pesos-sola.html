<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pesos de Solas</title>

    <!-- Bootstrap 5.3.8 -->   
    <link 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
      rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
      crossorigin="anonymous" />

    <script 
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
      crossorigin="anonymous" />
    </script>

    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/tabelas.css" />

    <!-- Select2 CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css"
    />
    
    <!-- Select2 JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>



    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw==" 
    crossorigin="anonymous" / referrerpolicy="no-referrer" />

    <link
      rel="icon"
      href="../assets/images/icon-sound.ico"
      type="image/x-icon" />
</head>

<body>
    <div class="container mt-4">
      <h4 class="mb-4 text-center">Pesquisa de Solas</h4>

    <div class="card p-3 mb-3 shadow-sm">
      <div class="row g-3">
        <div class=" col-12 col-sm-6 col-md-3">
          <select class="form-select" id="nome_sola">
            <option value="" selected>Nome Sola...</option>
          </select>
        </div>

     <div class="col-12 col-sm-6 col-md-2">
        <select class="form-select" id="codigo_sola">
          <option value="" selected>Código Sola...</option>
        </select>
      </div>

      <div class="col-md-3 d-flex gap-2">
        <button type="reset" class="btn btn-secondary flex-grow-1" id="btnLimparSola">
            <i class="fas fa-eraser"></i> Limpar
          </button> 
      </div>

    </div>
  </div>

  <!-- TABELA -->
  <div class="table-responsive">
    <table class="table table-hover align-middle table-geral">

      <thead class="table-primary text-center">
        <tr>
          <th rowspan="2">Número</th>
          <th rowspan="2">Sola</th>
          <th rowspan="2">Código</th>
          <th rowspan="2">Material Cunho</th>
          <th rowspan="2">Material Soleta</th>
          <th rowspan="2">Data</th>

          <!-- GRUPO PESOS -->
          <th colspan="5">Pesos</th>

        </tr>

        <tr>
          <th>PAR</th>
          <th>SOLETA</th>
          <th>PIG SOL.</th>
          <th>CUNHO</th>
          <th>PIG CUN.</th>
        </tr>
      </thead>

      <tbody class="text-center">
      </tbody>
    </table>
  </div>

  <!-- BOTÕES DE EXPORTAÇÃO -->
  <div id="exportacaoDados" class="d-flex gap-2 mt-3 mb-5 d-none">
    <button type="button" class="btn btn-primary" id="btnExportarPDF" title="Exportar em PDF">
      <i class="fas fa-file-pdf"></i> PDF
    </button>
    <button type="button" class="btn btn-primary" id="btnExportarExcel" title="Exportar em Excel">
      <i class="fas fa-file-excel"></i> Excel
    </button>
  </div>
</div>

<!-- Modal -->
    <div
      class="modal fade"
      id="modalSistema"
      tabindex="-1"
      aria-labelledby="modalSistemaLabel"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div
            id="modalSistema_titulo_div"
            class="modal-header bg-primary text-white"
          >
            <h5 id="modalSistema_titulo" class="modal-title">Título</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <p id="modalSistema_conteudo">Conteúdo</p>
            <ul id="modalSistema_listaErros" class="text-danger d-none"></ul>
          </div>
          <div class="modal-footer">
            <button
              id="modalSistema_btnCancelar"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Fechar
            </button>
            <button
              id="modalSistema_btnConfirmar"
              class="btn btn-primary d-none"
            >
              Confirmar
            </button>
          </div>
        </div>
      </div>
    </div>
    
     <script defer type="module" src="../js/components/navbar.js"></script>
     <script defer type="module" src="../js/app.js"></script>
     <script defer type="module" src="../js/consulta-solas.js"></script>
     
</body>
</html>
