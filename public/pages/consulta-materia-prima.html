<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Máteria Prima</title>

    <!-- Bootstrap 5.3.8 -->   
    <link 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
      rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
      crossorigin="anonymous" />

    <script 
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
      crossorigin="anonymous" />
    </script>

    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/tabelas.css" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw==" 
    crossorigin="anonymous" / referrerpolicy="no-referrer" />

    <link
      rel="icon"
      href="../assets/images/icon-sound.ico"
      type="image/x-icon" />
</head>

<body>
    <div class="container mt-4">
      <form id="filtrosMateriaPrima">
        <div class="row align-items-end mb-3">
          <div class="col-md-6">
            <label for="nome" class="form-label">Matéria Prima</label>
            <input type="text" class="form-control" id="nome" />
          </div> 

          <div class="col-md-6 d-flex gap-2">
            <button
              type="submit"
              class="btn btn-primary w-100"
              id="btnPesquisarMateriaPrima"
            >
              <i class="fas fa-paper-plane"></i> Pesquisar
            </button>
            <button
              type="button"
              class="btn btn-secondary w-100"
              id="btnLimparFiltros"
            >
              <i class="fas fa-eraser"></i> Limpar
            </button>
          </div>
        </div>
      </form>

      <div class="row">
        <div class="col">
          <div class="table-responsive">
            <table class="table table-striped table-geral">
              <thead>
                <tr>
                  <th>Matéria Prima</th>
                </tr>
              </thead>
              <tbody id="listaMateriasPrima">
                <td>
                  <button
                    class="btn btn-warning btn-sm btn-editar"
                    data-id="${u.id}"
                  >
                    <i class="fas fa-edit"></i>
                  </button>
                  <button
                    class="btn btn-danger btn-sm btn-excluir"
                    data-id="${u.id}"
                  >
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal -->
    <div
      class="modal fade"
      id="modalSistema"
      tabindex="-1"
      aria-labelledby="modalSistemaLabel"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div
            id="modalSistema_titulo_div"
            class="modal-header bg-primary text-white"
          >
            <h5 id="modalSistema_titulo" class="modal-title">Título</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <p id="modalSistema_conteudo">Conteúdo</p>
            <ul id="modalSistema_listaErros" class="text-danger d-none"></ul>
          </div>
          <div class="modal-footer">
            <button
              id="modalSistema_btnCancelar"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Fechar
            </button>
            <button
              id="modalSistema_btnConfirmar"
              class="btn btn-primary d-none"
            >
              Confirmar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script defer type="module" src="../js/components/navbar.js"></script>
    <script defer type="module" src="../js/app.js"></script>
    <script defer type="module" src="../js/consulta-materia-prima.js"></script>
    
</body>
</html>
