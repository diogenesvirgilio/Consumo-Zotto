<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadastrar Faltas</title>

    <!-- Bootstrap 5.3.8 -->   
    <link 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
      rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
      crossorigin="anonymous">

    <script 
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
      crossorigin="anonymous">
    </script>

    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/tabelas.css" />
    
    <!-- Select2 CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css"
    />
    
    <!-- Select2 JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
     
     <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      rel="icon"
      href="../assets/images/icon-sound.ico"
      type="image/x-icon"
    />
  </head>

  <body class="cadastro-page">
    <div class="container mt-4">
      <h4 class="mb-4 text-center">Cadastrar Faltas</h4>

   <form id="cadastroFaltasForm">
     <div class="container">

    <div class="row g-3">
      <div class="col-12 col-sm-6 col-md-3">
        <label for="materiaPrima" class="form-label">Matéria Prima</label>
        <select class="form-select" id="materiaPrima" required>
          <option value="" selected>Selecione...</option>
        </select>
      </div> 

      <div class="col-12 col-sm-6 col-md-2">
        <label for="cortador" class="form-label">Cortador</label>
        <select class="form-select" id="cortador">
          <option value="" selected>Selecione...</option>
        </select>
      </div>

      <div class="col-12 col-sm-6 col-md-2">
        <label for="falta" class="form-label">Falta(Qtd)</label>
        <input type="text" class="form-control" id="falta" placeholder="0,00">
      </div> 

      <div class="col-12 col-sm-6 col-md-2">
        <label for="data" class="form-label">Data de Cadastro</label>
        <input type="date" class="form-control" id="data" name="data">
      </div>

      <div class="col-12 col-sm-6 col-md-2">
        <label for="programacao" class="form-label">Programação</label>
        <input type="text" class="form-control" id="programacao" placeholder="Ex: 3110-1">
      </div>
    
    </div>
    
    <div class="row g-3 mt-1">
            <div class="col-12 col-sm-6 col-md-2">
              <label for="diaReuniao" class="form-label">Dia Reunião</label>
              <input type="text" class="form-control" id="diaReuniao">
            </div> 

            <div class="col-12 col-sm-6 col-md-2">
              <label for="requisicao" class="form-label">Requisição</label>
              <input type="text" class="form-control" id="requisicao">
            </div>
            
          <div class="col-12 col-md-6">
              <label for="observacao" class="form-label">Observação</label>
              <input type="text" class="form-control" id="observacao">
            </div>
    </div>
  
    <div class="row mt-3">
      <div class="col-12 col-md-6">
        <div class="d-flex flex-column flex-sm-row gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1" id="btnCadastrarFalta">
            <i class="fas fa-paper-plane"></i> Cadastrar
          </button>
          <button
              type="submit" class="btn btn-primary flex-grow-1" id="btnPesquisarFaltas">
              <i class="fas fa-search"></i> Pesquisar
          </button>
          <button type="reset" class="btn btn-secondary flex-grow-1" id="btnLimparFalta">
            <i class="fas fa-eraser"></i> Limpar
          </button> 
        </div>
      </div>    
    </div>

    </div>
  </form> 

  <!-- TABELA -->
   <div class="container mt-4">
      <div class="table-responsive">
          <table class="table table-striped table-geral">
              <thead>
                <tr>
                  <th>Matéria Prima</th>
                  <th>Cortador</th>
                  <th>Falta</th>
                  <th>Data</th>
                  <th>Programação</th>
                  <th>Requisição</th>
                  <th>Observação</th>
                  <th></th>
                  <th></th>
                </tr>
              </thead>

              <tbody id="listaFaltas"></tbody>
            </table>
          </div>
        </div>
</div>
    <!-- Modal -->
    <div
      class="modal fade"
      id="modalSistema"
      tabindex="-1"
      aria-labelledby="modalSistemaLabel"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div
            id="modalSistema_titulo_div"
            class="modal-header bg-primary text-white"
          >
            <h5 id="modalSistema_titulo" class="modal-title">Título</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <p id="modalSistema_conteudo">Conteúdo</p>
            <ul id="modalSistema_listaErros" class="text-danger d-none"></ul>
          </div>
          <div class="modal-footer">
            <button
              id="modalSistema_btnCancelar"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Fechar
            </button>
            <button
              id="modalSistema_btnConfirmar"
              class="btn btn-primary d-none"
            >
              Confirmar
            </button>
          </div>
          
        </div>
      </div>
    </div>
    
    <script type="module">
      import { loadNavbar } from "../js/components/navbar.js";
    </script>
    <script defer type="module" src="../js/app.js"></script>
    <script defer type="module" src="../js/faltas/cadastrar-faltas.js"></script>
    <script defer type="module" src="../js/faltas/consulta-faltas.js"></script>
  
  </body>
</html>
