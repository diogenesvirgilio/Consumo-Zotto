<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pesos de Solas</title>

    <!-- Bootstrap 5.3.8 -->   
    <link 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
      rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
      crossorigin="anonymous" />

    <script 
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
      crossorigin="anonymous" />
    </script>

    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/pesos-sola.css" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw==" 
    crossorigin="anonymous" / referrerpolicy="no-referrer" />

    <link
      rel="icon"
      href="../assets/images/icon-sound.ico"
      type="image/x-icon" />
</head>

<body>
    <div class="container mt-4">
      <h4 class="mb-4 text-center">Cadastrar/Atualizar Pesos</h4>

            <form id="cadastroSolaForm">
              <div class="container">

                <div class="row g-3">
                  <div class="col-12 col-sm-6 col-md-3">
                    <label for="nome_sola" class="form-label">Sola</label>
                    <input type="text" class="form-control" id="nome_sola" placeholder="Digite para buscar..." list="solasList" autocomplete="off">
                    <datalist id="solasList"></datalist>
                </div> 

                <div class="col-12 col-sm-6 col-md-2">
                  <label for="codigo_sola" class="form-label">Código Sola</label>
                  <input type="text" class="form-control" id="codigo_sola" placeholder="Digite para buscar..." list="codigoSolaList" autocomplete="off">
                  <datalist id="codigoSolaList"></datalist>
                </div> 

                <div class="col-md-2">
                  <label for="material_cunho" class="form-label">Material Cunho</label>
                  <select class="form-select" id="material_cunho">
                      <option value="" disabled selected>Selecione...</option>
                      <option value="micro">Micro</option>
                      <option value="pvc">PVC</option>
                      <option value="tr">TR</option>
                      </select>
                </div>

                <div class="col-md-2">
                  <label for="material_soleta" class="form-label">Material Soleta</label>
                  <select class="form-select" id="material_soleta">
                      <option value="" disabled selected>Selecione...</option>
                      <option value="micro">Micro</option>
                      <option value="pvc">PVC</option>
                      <option value="tr">TR</option>
                      </select>
                </div>

                <div class="col-12 col-sm-6 col-md-2">
                  <label for="data_atualizacao" class="form-label">Data de Atualização</label>
                  <input type="date" class="form-control" id="data_atualizacao" name="data">
                </div>

  <div class="container container-pesos">
    <div class="linha-tabelas">

    <!-- PAR -->
    <table class="tabela-peso">
      <thead>
        <tr>
          <th>NÚMERO</th>
          <th>PAR</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>37</td><td><input type="text" inputmode="decimal" id="sola_37"></td></tr>
        <tr><td>38</td><td><input type="text" inputmode="decimal" id="sola_38"></td></tr>
        <tr><td>39</td><td><input type="text" inputmode="decimal" id="sola_39"></td></tr>
        <tr><td>40</td><td><input type="text" inputmode="decimal" id="sola_40"></td></tr>
        <tr><td>41</td><td><input type="text" inputmode="decimal" id="sola_41"></td></tr>
        <tr><td>42</td><td><input type="text" inputmode="decimal" id="sola_42"></td></tr>
        <tr><td>43</td><td><input type="text" inputmode="decimal" id="sola_43"></td></tr>
        <tr><td>44</td><td><input type="text" inputmode="decimal" id="sola_44"></td></tr>
      </tbody>
    </table>

    <!-- SOLETA -->
    <table class="tabela-peso">
      <thead>
        <tr>
          <th>NÚMERO</th>
          <th>SOLETA PAR</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>37</td><td><input type="text" inputmode="decimal" id="soleta_37"></td></tr>
        <tr><td>38</td><td><input type="text" inputmode="decimal" id="soleta_38"></td></tr>
        <tr><td>39</td><td><input type="text" inputmode="decimal" id="soleta_39"></td></tr>
        <tr><td>40</td><td><input type="text" inputmode="decimal" id="soleta_40"></td></tr>
        <tr><td>41</td><td><input type="text" inputmode="decimal" id="soleta_41"></td></tr>
        <tr><td>42</td><td><input type="text" inputmode="decimal" id="soleta_42"></td></tr>
        <tr><td>43</td><td><input type="text" inputmode="decimal" id="soleta_43"></td></tr>
        <tr><td>44</td><td><input type="text" inputmode="decimal" id="soleta_44"></td></tr>
      </tbody>
    </table>

    <!-- CUNHO -->
    <table class="tabela-peso">
      <thead>
        <tr>
          <th>NÚMERO</th>
          <th>CUNHO PAR</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>37</td><td><input type="text" inputmode="decimal" id="cunho_37" readonly></td></tr>
        <tr><td>38</td><td><input type="text" inputmode="decimal" id="cunho_38" readonly></td></tr>
        <tr><td>39</td><td><input type="text" inputmode="decimal" id="cunho_39" readonly></td></tr>
        <tr><td>40</td><td><input type="text" inputmode="decimal" id="cunho_40" readonly></td></tr>
        <tr><td>41</td><td><input type="text" inputmode="decimal" id="cunho_41" readonly></td></tr>
        <tr><td>42</td><td><input type="text" inputmode="decimal" id="cunho_42" readonly></td></tr>
        <tr><td>43</td><td><input type="text" inputmode="decimal" id="cunho_43" readonly></td></tr>
        <tr><td>44</td><td><input type="text" inputmode="decimal" id="cunho_44" readonly></td></tr>
      </tbody>
    </table>

  </div>

  <div class="linha-tabelas linha-inferior">

    <!-- PIG SOLETA -->
    <table class="tabela-peso">
      <thead>
        <tr>
          <th>NÚMERO</th>
          <th>PIG. SOLETA</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>37</td><td><input type="text" inputmode="decimal" id="pig_soleta_37" readonly></td></tr>
        <tr><td>38</td><td><input type="text" inputmode="decimal" id="pig_soleta_38" readonly></td></tr>
        <tr><td>39</td><td><input type="text" inputmode="decimal" id="pig_soleta_39" readonly></td></tr>
        <tr><td>40</td><td><input type="text" inputmode="decimal" id="pig_soleta_40" readonly></td></tr>
        <tr><td>41</td><td><input type="text" inputmode="decimal" id="pig_soleta_41" readonly></td></tr>
        <tr><td>42</td><td><input type="text" inputmode="decimal" id="pig_soleta_42" readonly></td></tr>
        <tr><td>43</td><td><input type="text" inputmode="decimal" id="pig_soleta_43" readonly></td></tr>
        <tr><td>44</td><td><input type="text" inputmode="decimal" id="pig_soleta_44" readonly></td></tr>
      </tbody>
    </table>

    <!-- PIG CUNHO -->
    <table class="tabela-peso">
      <thead>
        <tr>
          <th>NÚMERO</th>
          <th>PIG. CUNHO</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>37</td><td><input type="text" inputmode="decimal" id="pig_cunho_37" readonly></td></tr>
        <tr><td>38</td><td><input type="text" inputmode="decimal" id="pig_cunho_38" readonly></td></tr>
        <tr><td>39</td><td><input type="text" inputmode="decimal" id="pig_cunho_39" readonly></td></tr>
        <tr><td>40</td><td><input type="text" inputmode="decimal" id="pig_cunho_40" readonly></td></tr>
        <tr><td>41</td><td><input type="text" inputmode="decimal" id="pig_cunho_41" readonly></td></tr>
        <tr><td>42</td><td><input type="text" inputmode="decimal" id="pig_cunho_42" readonly></td></tr>
        <tr><td>43</td><td><input type="text" inputmode="decimal" id="pig_cunho_43" readonly></td></tr>
        <tr><td>44</td><td><input type="text" inputmode="decimal" id="pig_cunho_44" readonly></td></tr>
      </tbody>
    </table>
  </div> 

  <div class="row mt-3">
      <div class="col-12 col-md-6">
        <div class="d-flex flex-column flex-sm-row gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1" id="btnCadastrarPeso">
            <i class="fas fa-paper-plane"></i> Cadastrar
          </button>
          <button type="reset" class="btn btn-secondary flex-grow-1" id="btnLimparPeso">
            <i class="fas fa-eraser"></i> Limpar
          </button>
          <button type="button" class="btn btn-warning flex-grow-1 d-none" id="btnCancelarEdicao">
            <i class="fas fa-times"></i> Cancelar
          </button> 
        </div>
      </div>    
    </div>
  </div>

  </div>
</form> 
</div>

<!-- Modal -->
    <div
      class="modal fade"
      id="modalSistema"
      tabindex="-1"
      aria-labelledby="modalSistemaLabel"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div
            id="modalSistema_titulo_div"
            class="modal-header bg-primary text-white"
          >
            <h5 id="modalSistema_titulo" class="modal-title">Título</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <p id="modalSistema_conteudo">Conteúdo</p>
            <ul id="modalSistema_listaErros" class="text-danger d-none"></ul>
          </div>
          <div class="modal-footer">
            <button
              id="modalSistema_btnCancelar"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Fechar
            </button>
            <button
              id="modalSistema_btnConfirmar"
              class="btn btn-primary d-none"
            >
              Confirmar
            </button>
          </div>
        </div>
      </div>
    </div>
    
     <script defer type="module" src="../js/components/navbar.js"></script>
     <script defer type="module" src="../js/app.js"></script>
     <script defer type="module" src="../js/cadastrar-solas.js"></script>
     
</body>
</html>
