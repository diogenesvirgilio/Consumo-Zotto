<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relatório de Faltas</title>

    <!-- Bootstrap 5.3.8 -->   
    <link 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
      rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
      crossorigin="anonymous" />

    <script 
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
      crossorigin="anonymous" />
    </script>
     
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/tabelas.css" />
    <link rel="stylesheet" href="../assets/css/relatorio-faltas.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw==" 
    crossorigin="anonymous" / referrerpolicy="no-referrer" />

    <link
      rel="icon"
      href="../assets/images/icon-sound.ico"
      type="image/x-icon" />
  </head>

  <body>
    <div class="container mt-4">
      <h4 class="mb-4 text-center">Relatório de Faltas</h4>

      <!-- FILTROS -->
      <div class="filtro-section">
        <h5 class="mb-3">
          <i class="fas fa-filter"></i> Selecione as Programações
        </h5>
        
        <div class="programacoes-selector">
          <!-- Campo de Pesquisa -->
          <div class="programacoes-search">
            <input
              type="text"
              id="pesquisaProgramacao"
              placeholder="Pesquisar programação..."
              class="form-control"
            />
          </div>

          <!-- Lista de Programações -->
          <div class="programacoes-list" id="programacoesContainer">
            <div class="no-results">
              <i class="fas fa-spinner fa-spin"></i> Carregando programações...
            </div>
          </div>

          <!-- Footer com Botões -->
          <div class="programacoes-footer">
            <button type="button" class="btn btn-sm btn-outline-primary" id="btnSelecionarTodas">
              <i class="fas fa-check-double"></i> Selecionar Todos
            </button>
            <button type="button" class="btn btn-sm btn-outline-secondary" id="btnLimparSelecao">
              <i class="fas fa-times"></i> Limpar
            </button>
            <div class="selected-count">
              <span id="selectedCountDisplay">0 selecionadas</span>
            </div>
          </div>
        </div>

        <!-- Botão Gerar Relatório -->
        <div class="mt-3">
          <button type="button" class="btn btn-primary btn-lg w-100" id="btnGerarRelatorio">
            <i class="fas fa-chart-pie"></i> Gerar Relatório
          </button>
        </div>
      </div>

      <!-- RESUMO ESTATÍSTICO -->
      <div id="resumoSection" class="d-none">
        <div class="resumo-section">
          <h5 class="mb-3">
            <i class="fas fa-chart-line"></i> Resumo Estatístico
          </h5>
          <div class="row">
            <div class="col-md-3">
              <div class="stat-card">
                <div class="stat-value" id="totalRegistros">0</div>
                <div class="stat-label">Total de Registros</div>
              </div>
            </div>
            <div class="col-md-3">
              <div class="stat-card">
                <div class="stat-value" id="totalFaltas">0,00</div>
                <div class="stat-label">Total de Faltas (Qtd)</div>
              </div>
            </div>
            <div class="col-md-3">
              <div class="stat-card">
                <div class="stat-value" id="programacoesCount">0</div>
                <div class="stat-label">Programações Selecionadas</div>
              </div>
            </div>
            <div class="col-md-3">
              <div class="stat-card">
                <div class="stat-value" id="dataRangeLabel">-</div>
                <div class="stat-label">Período</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- TABELA DE RESULTADOS -->
      <div id="relatorioTableContainer" class="d-none">
        <h5 class="mb-3">
          <i class="fas fa-table"></i> Resumo das Faltas
        </h5> 
        
        <div class="table-responsive">
          <table class="table table-striped table-geral">
            <thead>
              <tr>
                <th>Matéria Prima</th>
                <th>Falta (Qtd)</th>
              </tr>
            </thead>
            <tbody id="relatorioTableBody"></tbody>
          </table>
        </div>

        <div class=" d-flex gap-2 mt-3 mb-5">
          <button type="button" class="btn btn-primary" id="btnExportarPDF">
            <i class="fas fa-file-pdf"></i> Exportar PDF
          </button>
          <button type="button" class="btn btn-primary" id="btnExportarCSV">
            <i class="fas fa-file-csv"></i> Exportar CSV
          </button>
          <button type="button" class="btn btn-primary" id="btnExportarExcel">
            <i class="fas fa-file-excel"></i> Exportar Excel
          </button>
          <button type="button" class="btn btn-secondary" id="btnVoltar">
            <i class="fas fa-redo"></i> Nova Pesquisa
          </button>
        </div>
        
      </div>
    </div>

    <!-- Modal -->
    <div
      class="modal fade"
      id="modalSistema"
      tabindex="-1"
      aria-labelledby="modalSistemaLabel"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div
            id="modalSistema_titulo_div"
            class="modal-header bg-primary text-white"
          >
            <h5 id="modalSistema_titulo" class="modal-title">Título</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <p id="modalSistema_conteudo">Conteúdo</p>
            <ul id="modalSistema_listaErros" class="text-danger d-none"></ul>
          </div>
          <div class="modal-footer">
            <button
              id="modalSistema_btnCancelar"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Fechar
            </button>
            <button
              id="modalSistema_btnConfirmar"
              class="btn btn-primary d-none"
            >
              Confirmar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script defer type="module" src="../js/components/navbar.js"></script>
    <script defer type="module" src="../js/app.js"></script>
    <script defer type="module" src="../js/faltas/relatorio-faltas.js"></script>
    
  </body>
</html>
